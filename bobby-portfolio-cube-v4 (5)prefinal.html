<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobby Keerthan — UI/UX & Interactive Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03030a;
  --fg:#f0ece3;
  --fg2:rgba(240,236,227,0.45);
  --fg3:rgba(240,236,227,0.12);
  --gold:#d4a853;
  --gold2:rgba(212,168,83,0.15);
  --blue:#4a8fa8;
  --mono:'Syne',sans-serif;
  --serif:'DM Serif Display',serif;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:radial-gradient(ellipse at 50% 55%, #0a0818 0%, #03030a 65%);color:var(--fg);font-family:var(--mono);cursor:none;}

/* CURSOR */
#cur{position:fixed;width:7px;height:7px;background:var(--fg);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:background .2s,transform .2s;}
#cur-r{position:fixed;width:30px;height:30px;border:1px solid rgba(240,236,227,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .1s ease,top .1s ease,width .25s,height .25s,border-color .25s;}
.hovering #cur{background:var(--gold);transform:translate(-50%,-50%) scale(1.4);}
.hovering #cur-r{border-color:var(--gold);width:48px;height:48px;}

/* CANVAS */
#c{position:fixed;inset:0;width:100%;height:100%;display:block;}

/* HUD TOP */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.8rem 2.5rem;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:11px;letter-spacing:.22em;color:var(--fg);font-weight:700;}
.logo span{color:var(--gold);}
#hud-coords{font-size:10px;letter-spacing:.12em;color:var(--fg2);}

/* HUD BOTTOM */
#hud-bottom{position:fixed;bottom:1.8rem;left:0;right:0;z-index:100;padding:0 2.5rem;display:flex;justify-content:space-between;align-items:flex-end;}
.hint{font-size:10px;letter-spacing:.18em;color:var(--fg2);line-height:1.8;}

/* POINT LABELS — shown around the pyramid corners */
.pt-label{
  position:fixed;z-index:50;pointer-events:all;cursor:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transform:translate(-50%,-50%);
  transition:opacity .4s;
}
.pt-label .dot{
  width:8px;height:8px;border-radius:50%;
  border:1px solid var(--gold);background:transparent;
  transition:background .3s,transform .3s;
  box-shadow:0 0 6px rgba(212,168,83,0.4);
}
.pt-label:hover .dot{background:var(--gold);transform:scale(1.6);}
.pt-label .lbl-wrap{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(3,3,10,0.62);
  border:1px solid rgba(212,168,83,0.18);
  border-radius:6px;
  padding:5px 11px 4px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  transition:background .3s,border-color .3s;
}
.pt-label:hover .lbl-wrap{
  background:rgba(6,5,18,0.82);
  border-color:rgba(212,168,83,0.45);
}
.pt-label .lbl{
  font-size:9px;letter-spacing:.22em;color:rgba(240,236,227,0.9);
  transition:color .3s;white-space:nowrap;
  text-shadow:0 1px 8px rgba(0,0,0,0.9);
}
.pt-label:hover .lbl{color:var(--gold);}
.pt-label .num{font-size:8px;color:rgba(240,236,227,0.4);letter-spacing:.1em;}

/* PANEL */
#panel{
  position:fixed;z-index:200;
  top:50%;left:50%;
  width:min(560px,88vw);
  transform:translate(-50%,-50%) scale(.92);
  background:rgba(6,6,10,0.92);
  border:1px solid var(--fg3);
  backdrop-filter:blur(20px);
  padding:3rem 3rem 2.5rem;
  opacity:0;pointer-events:none;
  transition:opacity .45s cubic-bezier(.4,0,.2,1), transform .45s cubic-bezier(.4,0,.2,1);
  max-height:80vh;overflow-y:auto;
}
#panel.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
#panel-close{
  position:absolute;top:1.2rem;right:1.4rem;
  font-size:11px;letter-spacing:.18em;color:var(--fg2);
  background:none;border:none;cursor:none;
  transition:color .2s;
}
#panel-close:hover{color:var(--gold);}
#panel-tag{font-size:9px;letter-spacing:.24em;color:var(--gold);margin-bottom:1rem;}
#panel-title{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;line-height:1.15;margin-bottom:1.5rem;}
#panel-body{font-size:13px;line-height:1.9;color:rgba(240,236,227,0.7);}

/* panel content helpers */
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--fg3);margin:1.5rem 0;}
.pg-item{background:var(--bg);padding:1.2rem 1rem;}
.pg-num{font-family:var(--serif);font-size:2rem;color:var(--fg);line-height:1;}
.pg-label{font-size:9px;letter-spacing:.16em;color:var(--fg2);margin-top:.3rem;}

.work-list{margin:1.5rem 0;display:flex;flex-direction:column;gap:1px;background:var(--fg3);}
.wl-item{background:var(--bg);padding:1.1rem 1rem;display:flex;justify-content:space-between;align-items:center;transition:background .25s;}
.wl-item:hover{background:#0f0f14;}
.wl-title{font-size:12px;letter-spacing:.06em;color:var(--fg);}
.wl-tag{font-size:9px;letter-spacing:.14em;color:var(--gold);padding:3px 8px;border:1px solid rgba(212,168,83,.3);}

.skill-row{margin-bottom:1.1rem;}
.sk-top{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:10px;letter-spacing:.14em;color:var(--fg2);}
.sk-bar{height:1px;background:var(--fg3);}
.sk-fill{height:1px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform 1.1s cubic-bezier(.4,0,.2,1);}

.contact-item{display:flex;align-items:center;gap:1rem;padding:.9rem 0;border-bottom:1px solid var(--fg3);font-size:12px;color:var(--fg2);text-decoration:none;transition:color .25s;letter-spacing:.06em;}
.contact-item:hover{color:var(--gold);}
.contact-item .ci-line{width:24px;height:1px;background:currentColor;flex-shrink:0;transition:width .3s;}
.contact-item:hover .ci-line{width:40px;}

/* scrollbar inside panel */
#panel::-webkit-scrollbar{width:2px;}
#panel::-webkit-scrollbar-track{background:transparent;}
#panel::-webkit-scrollbar-thumb{background:var(--fg3);}

/* APEX label */
#apex-label{
  position:fixed;z-index:50;pointer-events:none;
  transform:translate(-50%,-50%);
  font-size:9px;letter-spacing:.22em;color:var(--fg2);
  text-align:center;line-height:1.8;
  transition:opacity .4s;
}
/* WORK FULLSCREEN */
#panel.work-mode{
  width:100vw;height:100vh;max-height:100vh;
  top:0;left:0;transform:none;
  padding:0;border:none;overflow:hidden;
  background:rgba(3,3,10,0.97);
  border-radius:0;
}
#panel.work-mode.open{transform:none;}
#work-canvas{display:block;cursor:default;}
#work-hint{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:.2em;color:rgba(240,236,227,.25);
  pointer-events:none;white-space:nowrap;
}
#work-back{
  position:absolute;top:1.8rem;left:2.5rem;
  font-size:10px;letter-spacing:.18em;color:rgba(240,236,227,.4);
  background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;
  transition:color .2s;z-index:10;
}
#work-back:hover{color:#d4a853;}
/* PROJECT DETAIL */
#proj-detail{
  position:fixed;inset:0;z-index:500;
  background:rgba(3,3,10,0.95);backdrop-filter:blur(22px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
#proj-detail.open{opacity:1;pointer-events:all;}
#proj-card{
  width:min(700px,92vw);max-height:88vh;overflow-y:auto;
  border:1px solid rgba(212,168,83,.18);background:#07070f;
  padding:2.5rem 2.5rem 2rem;position:relative;
}
#proj-card::-webkit-scrollbar{width:2px;}
#proj-card::-webkit-scrollbar-thumb{background:rgba(212,168,83,.2);}
.proj-media{
  width:100%;aspect-ratio:16/9;background:#0c0c18;
  border:1px solid rgba(240,236,227,.06);margin-bottom:1.5rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.8rem;color:rgba(240,236,227,.2);font-size:10px;letter-spacing:.18em;
}
.proj-tags-row{display:flex;gap:.5rem;flex-wrap:wrap;margin:.8rem 0 1.5rem;}
.proj-tag{font-size:9px;letter-spacing:.14em;color:#d4a853;padding:3px 10px;border:1px solid rgba(212,168,83,.25);}
#proj-close{
  position:absolute;top:1.2rem;right:1.4rem;background:none;border:none;
  color:rgba(240,236,227,.35);font-size:11px;letter-spacing:.18em;
  cursor:pointer;font-family:'Syne',sans-serif;transition:color .2s;
}
#proj-close:hover{color:#d4a853;}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<canvas id="c"></canvas>

<div id="hud-top">
  <div class="logo">BOBBY <span>KEERTHAN</span></div>
  <div id="hud-coords">X 0000 &nbsp; Y 0000</div>
</div>

<div id="hud-bottom">
  <div class="hint">CLICK A CORNER<br>TO DISCOVER</div>
  <div class="hint" style="text-align:right;">UI/UX &amp; INTERACTIVE<br>DESIGNER</div>
</div>

<!-- Corner labels — positions set by JS -->
<div class="pt-label" id="lbl-work" data-section="work">
  <div class="dot"></div>
  <div class="lbl-wrap"><div class="lbl">PROJECT</div><div class="num">01</div></div>
</div>
<div class="pt-label" id="lbl-about" data-section="about">
  <div class="dot"></div>
  <div class="lbl-wrap"><div class="lbl">ABOUT</div><div class="num">02</div></div>
</div>
<div class="pt-label" id="lbl-skills" data-section="skills">
  <div class="dot"></div>
  <div class="lbl-wrap"><div class="lbl">SKILLS</div><div class="num">03</div></div>
</div>
<div class="pt-label" id="lbl-contact" data-section="contact">
  <div class="dot"></div>
  <div class="lbl-wrap"><div class="lbl">CONTACT</div><div class="num">04</div></div>
</div>
<div id="apex-label">BOBBY<br>KEERTHAN</div>

<!-- PANEL -->
<div id="panel">
  <button id="panel-close">✕ CLOSE</button>
  <div id="panel-tag"></div>
  <div id="panel-title"></div>
  <div id="panel-body"></div>
</div>

<!-- PROJECT DETAIL OVERLAY -->
<div id="proj-detail">
  <div id="proj-card">
    <button id="proj-close">✕ CLOSE</button>
    <div id="proj-num"  style="font-size:9px;letter-spacing:.24em;color:#d4a853;margin-bottom:.5rem;"></div>
    <div id="proj-name" style="font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:300;color:#f0ece3;line-height:1.15;margin-bottom:.4rem;"></div>
    <div class="proj-tags-row" id="proj-tags"></div>
    <div class="proj-media" id="proj-media"></div>
    <div id="proj-desc" style="font-size:13px;line-height:1.95;color:rgba(240,236,227,.62);"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── CURSOR ──────────────────────────────────────
const cur = document.getElementById('cur');
const curR = document.getElementById('cur-r');
const coordsEl = document.getElementById('hud-coords');

document.addEventListener('mousemove', e=>{
  cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
  curR.style.left=e.clientX+'px'; curR.style.top=e.clientY+'px';
  coordsEl.innerHTML=`X ${String(e.clientX).padStart(4,'0')} &nbsp; Y ${String(e.clientY).padStart(4,'0')}`;
});

// ── RENDERER ────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 0.2, 7.5);

// ── SHARED ROUND STAR TEXTURE ───────────────────
const dotCv = document.createElement('canvas');
dotCv.width = dotCv.height = 64;
const dotCtx = dotCv.getContext('2d');
const dg = dotCtx.createRadialGradient(32,32,0,32,32,32);
dg.addColorStop(0,   'rgba(255,255,255,1)');
dg.addColorStop(0.25,'rgba(255,255,255,0.9)');
dg.addColorStop(0.6, 'rgba(255,255,255,0.25)');
dg.addColorStop(1,   'rgba(255,255,255,0)');
dotCtx.fillStyle = dg;
dotCtx.fillRect(0, 0, 64, 64);
const dotTex = new THREE.CanvasTexture(dotCv);

// ── STAR CLOUD HELPER ───────────────────────────
function starCloud(count, rMin, rMax, color, size, opacity) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = rMin + Math.random() * (rMax - rMin);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    map: dotTex, color, size, transparent: true, opacity,
    sizeAttenuation: true, alphaTest: 0.02, depthWrite: false
  });
  return new THREE.Points(geo, mat);
}

// ── STARFIELD LAYERS ────────────────────────────
scene.add(starCloud(2000, 35, 120, 0xe8e0d0, 0.22, 0.65));
scene.add(starCloud(700,  20, 75,  0xf5e8c0, 0.40, 0.60));
const brightStars = starCloud(150, 12, 50, 0xffd890, 1.0, 0.88);
scene.add(brightStars);

// Milky Way band
const mwGeo = new THREE.BufferGeometry();
const mwPos = new Float32Array(1000 * 3);
for (let i = 0; i < 1000; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 25 + Math.random() * 20;
  mwPos[i*3]   = r * Math.cos(a);
  mwPos[i*3+1] = (Math.random() - 0.5) * 4;
  mwPos[i*3+2] = r * Math.sin(a) - 25;
}
mwGeo.setAttribute('position', new THREE.BufferAttribute(mwPos, 3));
const milkyWay = new THREE.Points(mwGeo, new THREE.PointsMaterial({
  map: dotTex, color: 0xd0c0f8, size: 0.18, transparent: true,
  opacity: 0.40, sizeAttenuation: true, alphaTest: 0.02, depthWrite: false
}));
scene.add(milkyWay);

// Nebula sprites
const nebCv = document.createElement('canvas');
nebCv.width = nebCv.height = 128;
const nebCtx = nebCv.getContext('2d');
const ng = nebCtx.createRadialGradient(64,64,0,64,64,64);
ng.addColorStop(0,   'rgba(255,255,255,0.25)');
ng.addColorStop(0.5, 'rgba(255,255,255,0.08)');
ng.addColorStop(1,   'rgba(0,0,0,0)');
nebCtx.fillStyle = ng; nebCtx.fillRect(0,0,128,128);
const nebTex = new THREE.CanvasTexture(nebCv);
[
  {col:0x6644cc, x:-22, y: 5, z:-18, s:60},
  {col:0x2255bb, x: 18, y:-4, z:-22, s:70},
  {col:0xaa3366, x:-10, y:-6, z:-30, s:55},
  {col:0xd4a853, x: 25, y: 6, z:-15, s:50},
].forEach(n => {
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: nebTex, color: n.col, transparent: true, opacity: 0.30, depthWrite: false
  }));
  sp.position.set(n.x, n.y, n.z);
  sp.scale.set(n.s, n.s, 1);
  scene.add(sp);
});

// ── BLACK HOLE ──────────────────────────────────
const bhGroup = new THREE.Group();
scene.add(bhGroup);

// Build photorealistic M87-style black hole on canvas
const bhCv = document.createElement('canvas');
bhCv.width = bhCv.height = 1024;
const bhCtx = bhCv.getContext('2d');
const C = 512; // center

// ── OUTER NEBULA HALO ──
const outerGlow = bhCtx.createRadialGradient(C, C, 0, C, C, C);
outerGlow.addColorStop(0,    'rgba(0,0,0,0)');
outerGlow.addColorStop(0.25, 'rgba(0,0,0,0)');
outerGlow.addColorStop(0.42, 'rgba(255,130,20,0.04)');
outerGlow.addColorStop(0.55, 'rgba(255,100,10,0.14)');
outerGlow.addColorStop(0.68, 'rgba(210,130,30,0.28)');
outerGlow.addColorStop(0.78, 'rgba(180,100,15,0.18)');
outerGlow.addColorStop(0.88, 'rgba(140,70,10,0.08)');
outerGlow.addColorStop(1,    'rgba(0,0,0,0)');
bhCtx.fillStyle = outerGlow;
bhCtx.fillRect(0, 0, 1024, 1024);

// ── ACCRETION DISK — painted in ellipse to suggest tilt ──
// Draw in layers from outer to inner for correct compositing
const diskLayers = [
  { rx: 370, ry: 100, alpha: 0.07, color: '200,120,30' },
  { rx: 320, ry: 88,  alpha: 0.14, color: '220,140,40' },
  { rx: 280, ry: 76,  alpha: 0.22, color: '240,155,50' },
  { rx: 240, ry: 64,  alpha: 0.32, color: '255,170,60' },
  { rx: 200, ry: 54,  alpha: 0.42, color: '255,185,70' },
  { rx: 165, ry: 44,  alpha: 0.55, color: '255,200,85' },
  { rx: 135, ry: 36,  alpha: 0.68, color: '255,215,100'},
  { rx: 108, ry: 29,  alpha: 0.80, color: '255,230,130'},
  { rx:  84, ry: 22,  alpha: 0.92, color: '255,245,160'},
];

// Subtract-style: draw ellipse outlines with glow
diskLayers.forEach(({ rx, ry, alpha, color }) => {
  // Glow ring
  bhCtx.save();
  bhCtx.translate(C, C + 30);
  for (let w = 18; w >= 1; w--) {
    bhCtx.beginPath();
    bhCtx.ellipse(0, 0, rx + w, ry + w * 0.27, 0, 0, Math.PI * 2);
    bhCtx.strokeStyle = `rgba(${color},${alpha * (1 - w/20)})`;
    bhCtx.lineWidth = w;
    bhCtx.stroke();
  }
  bhCtx.restore();
});

// ── BRIGHT PHOTON RING (very tight, very bright) ──
bhCtx.save();
bhCtx.translate(C, C + 30);
for (let w = 10; w >= 1; w--) {
  bhCtx.beginPath();
  bhCtx.ellipse(0, 0, 78 + w, 21 + w * 0.27, 0, 0, Math.PI * 2);
  bhCtx.strokeStyle = `rgba(255,250,200,${0.95 * (1 - w/12)})`;
  bhCtx.lineWidth = w;
  bhCtx.stroke();
}
bhCtx.restore();

// ── LENSING GLOW AROUND CENTER ──
const lensGrad = bhCtx.createRadialGradient(C, C+28, 0, C, C+28, 90);
lensGrad.addColorStop(0,    'rgba(0,0,0,1)');
lensGrad.addColorStop(0.55, 'rgba(0,0,0,0.98)');
lensGrad.addColorStop(0.72, 'rgba(20,8,0,0.7)');
lensGrad.addColorStop(0.82, 'rgba(60,25,5,0.4)');
lensGrad.addColorStop(0.92, 'rgba(100,50,10,0.15)');
lensGrad.addColorStop(1,    'rgba(0,0,0,0)');
bhCtx.fillStyle = lensGrad;
bhCtx.fillRect(0, 0, 1024, 1024);

// ── RELATIVISTIC JET (faint blue upward beam) ──
const jetGrad = bhCtx.createLinearGradient(C, C - 80, C, C - 420);
jetGrad.addColorStop(0, 'rgba(100,160,255,0.22)');
jetGrad.addColorStop(0.4,'rgba(80,130,220,0.10)');
jetGrad.addColorStop(1,  'rgba(60,100,180,0)');
bhCtx.save();
bhCtx.translate(C, 0);
bhCtx.beginPath();
bhCtx.moveTo(-12, C - 75);
bhCtx.lineTo(12, C - 75);
bhCtx.lineTo(2, C - 420);
bhCtx.lineTo(-2, C - 420);
bhCtx.closePath();
bhCtx.fillStyle = jetGrad;
bhCtx.fill();
bhCtx.restore();

// ── ABSOLUTE BLACK CENTER ──
const voidGrad = bhCtx.createRadialGradient(C, C+30, 0, C, C+30, 72);
voidGrad.addColorStop(0,   'rgba(0,0,0,1)');
voidGrad.addColorStop(0.88,'rgba(0,0,0,1)');
voidGrad.addColorStop(1,   'rgba(0,0,0,0)');
bhCtx.fillStyle = voidGrad;
bhCtx.fillRect(0, 0, 1024, 1024);

const bhTex = new THREE.CanvasTexture(bhCv);
const bhSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map: bhTex,
  transparent: true,
  opacity: 1.0,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
}));
bhSprite.scale.set(16, 16, 1);
bhGroup.add(bhSprite);

// Add an extra large soft amber halo sprite behind
const haloCv = document.createElement('canvas');
haloCv.width = haloCv.height = 256;
const hCtx = haloCv.getContext('2d');
const hg = hCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
hg.addColorStop(0,    'rgba(255,140,30,0.0)');

];

function buildPyramidGeo() {
  const geo = new THREE.BufferGeometry();
  const verts = [], normals = [], uvs = [];
  function addTri(a, b, c) {
    const n = new THREE.Vector3()
      .crossVectors(new THREE.Vector3().subVectors(b,a), new THREE.Vector3().subVectors(c,a))
      .normalize();
    [a,b,c].forEach(v => { verts.push(v.x,v.y,v.z); normals.push(n.x,n.y,n.z); });
    uvs.push(0,0,1,0,0.5,1);
  }
  addTri(apex, baseVerts[0], baseVerts[1]);
  addTri(apex, baseVerts[1], baseVerts[2]);
  addTri(apex, baseVerts[2], baseVerts[3]);
  addTri(apex, baseVerts[3], baseVerts[0]);
  addTri(baseVerts[0], baseVerts[3], baseVerts[2]);
  addTri(baseVerts[0], baseVerts[2], baseVerts[1]);
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  geo.setAttribute('normal',   new THREE.BufferAttribute(new Float32Array(normals), 3));
  geo.setAttribute('uv',       new THREE.BufferAttribute(new Float32Array(uvs), 2));
  return geo;
}

let isDrag=false, prevDX=0, prevDY=0, autoRot=true;

canvas.addEventListener('mousedown', e => { isDrag=true; prevDX=e.clientX; prevDY=e.clientY; });
window.addEventListener('mouseup', () => { isDrag=false; setTimeout(()=>autoRot=true, 3000); });
window.addEventListener('mousemove', e => {
  if (!isDrag) return;
  tRotY += (e.clientX-prevDX) * 0.01;
  tRotX += (e.clientY-prevDY) * 0.008;
  prevDX=e.clientX; prevDY=e.clientY; autoRot=false;
});
canvas.addEventListener('touchstart', e=>{ isDrag=true; prevDX=e.touches[0].clientX; prevDY=e.touches[0].clientY; autoRot=false; });
window.addEventListener('touchend',   ()=>{ isDrag=false; setTimeout(()=>autoRot=true,3000); });
window.addEventListener('touchmove',  e=>{ if(!isDrag)return; tRotY+=(e.touches[0].clientX-prevDX)*.01; tRotX+=(e.touches[0].clientY-prevDY)*.008; prevDX=e.touches[0].clientX; prevDY=e.touches[0].clientY; });

function worldToScreen(v3) {
  const v = v3.clone().project(camera);
  return { x:(v.x*.5+.5)*innerWidth, y:(-.5*v.y+.5)*innerHeight };
}

function makeShootingStar() {
  const dir = new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*.6,0).normalize();
  const start = new THREE.Vector3(-14+Math.random()*8, 5+Math.random()*4, -3);

  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0xfff8e0, transparent:true, opacity:0});
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return {geo, mat, start:start.clone(), dir, progress:0, speed:0.03+Math.random()*0.02, active:true};
}

const PALETTES = {
  '01': { accent:'#c9a96e', accent2:'#8b6914', dark:'rgba(20,14,4,0.82)'  },
  '02': { accent:'#a855f7', accent2:'#7c3aed', dark:'rgba(18,4,36,0.72)'  },
  '03': { accent:'#d4f000', accent2:'#a3b800', dark:'rgba(10,12,0,0.88)'  },
  '04': { accent:'#22c55e', accent2:'#16a34a', dark:'rgba(0,18,6,0.72)'   },
  '05': { accent:'#e8c4a0', accent2:'#b07d54', dark:'rgba(20,14,10,0.72)' },
  '06': { accent:'#d4a853', accent2:'#92650a', dark:'rgba(6,4,15,0.72)'   },
};

function buildFaceCanvas(proj, img) {
  const S = 1024; // high resolution
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const c = cv.getContext('2d');
  const pal = PALETTES[proj.num] || PALETTES['06'];

  // ── PHOTO FILL ──
  if (img) {
    // Cover-fit the image
    const iW = img.naturalWidth || img.width;
    const iH = img.naturalHeight || img.height;
    const scale = Math.max(S / iW, S / iH);
    const dw = iW * scale, dh = iH * scale;
    c.drawImage(img, (S - dw) / 2, (S - dh) / 2, dw, dh);
  }

  // ── DARK VIGNETTE OVERLAY — preserve photo, darken edges + bottom ──
  const vig = c.createRadialGradient(S/2, S*0.38, S*0.15, S/2, S/2, S*0.78);
  vig.addColorStop(0,   'rgba(0,0,0,0)');
  vig.addColorStop(0.5, 'rgba(0,0,0,0.18)');
  vig.addColorStop(1,   'rgba(0,0,0,0.72)');
  c.fillStyle = vig;
  c.fillRect(0, 0, S, S);

  // Strong bottom gradient for text legibility
  const bot = c.createLinearGradient(0, S * 0.45, 0, S);
  bot.addColorStop(0,   'rgba(0,0,0,0)');
  bot.addColorStop(0.4, 'rgba(0,0,0,0.55)');
  bot.addColorStop(1,   'rgba(0,0,0,0.93)');
  c.fillStyle = bot;
  c.fillRect(0, 0, S, S);

  // Subtle colour tint from palette
  c.fillStyle = pal.dark;
  c.globalAlpha = 0.18;
  c.fillRect(0, 0, S, S);
  c.globalAlpha = 1;

  // ── TOP LEFT — number badge ──
  const bH = 44, bPad = 20;
  const bW = c.measureText(`PROJECT ${proj.num}`).width + bPad * 2 + 8;
  // Badge pill
  const badgeGrad = c.createLinearGradient(36, 36, 36 + bW, 36 + bH);
  badgeGrad.addColorStop(0, pal.accent);
  badgeGrad.addColorStop(1, pal.accent2);
  c.fillStyle = badgeGrad;
  roundRect(c, 36, 36, bW + 40, bH, 10);
  c.fill();
  c.font = `700 22px 'Syne',sans-serif`;
  c.fillStyle = 'rgba(0,0,0,0.85)';
  c.textAlign = 'left';
  c.textBaseline = 'middle';
  c.fillText(`PROJECT ${proj.num}`, 36 + bPad, 36 + bH / 2);

  // ── TOP RIGHT — corner bracket ──
  c.strokeStyle = pal.accent;
  c.lineWidth = 3;
  c.globalAlpha = 0.5;
  c.beginPath(); c.moveTo(S - 50, 36);  c.lineTo(S - 36, 36);  c.lineTo(S - 36, 80); c.stroke();
  c.globalAlpha = 1;

  // ── BOTTOM TEXT AREA ──
  const textBase = S - 200;

  // Tags row
  c.font = `600 18px 'Syne',sans-serif`;
  const tags = proj.tags.slice(0, 3);
  let tagX = 36;
  tags.forEach(t => {
    const tw = c.measureText(t).width + 28;
    c.fillStyle = 'rgba(255,255,255,0.10)';
    roundRect(c, tagX, textBase, tw, 34, 6);
    c.fill();
    c.strokeStyle = `${pal.accent}80`;
    c.lineWidth = 1.2;
    roundRect(c, tagX, textBase, tw, 34, 6);
    c.stroke();
    c.fillStyle = pal.accent;
    c.textAlign = 'left';
    c.textBaseline = 'middle';
    c.fillText(t, tagX + 14, textBase + 17);
    tagX += tw + 12;
  });

  // Project name
  const parts = proj.name.split(' - ');
  c.font = `800 ${parts[0].length > 12 ? 48 : 56}px 'Syne',sans-serif`;
  c.fillStyle = '#f0ece3';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.shadowColor = 'rgba(0,0,0,0.8)';
  c.shadowBlur = 16;
  c.fillText(parts[0], 36, textBase + 50);
  c.shadowBlur = 0;

  if (parts[1]) {
    c.font = `500 28px 'Syne',sans-serif`;
    c.fillStyle = `rgba(240,236,227,0.55)`;
    c.fillText(parts[1], 36, textBase + 120);
  }

  // Bottom accent line + CTA
  c.fillStyle = pal.accent;
  c.globalAlpha = 0.85;
  c.fillRect(36, S - 44, 72, 3);
  c.globalAlpha = 1;
  c.font = '600 18px Syne,sans-serif';
  c.fillStyle = 'rgba(240,236,227,0.45)';
  c.textAlign = 'left';
  c.textBaseline = 'middle';
  c.fillText('VIEW PROJECT →', 120, S - 42);

  // Edge glow border
  const edgeG = c.createLinearGradient(0, 0, S, 0);
  edgeG.addColorStop(0,   `${pal.accent}88`);
  edgeG.addColorStop(0.5, `${pal.accent}22`);
  edgeG.addColorStop(1,   `${pal.accent}88`);
  c.strokeStyle = edgeG;
  c.lineWidth = 4;
  c.strokeRect(2, 2, S - 4, S - 4);

  return cv;
}

// Pre-load all face images then build cube
function loadImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null); // fallback: no image
    img.src = url;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

      <div style="font-size:9px;letter-spacing:.18em;color:rgba(240,236,227,0.25);line-height:2;">BOBBY KEERTHAN · UI/UX DESIGNER</div>
      <div style="font-size:9px;letter-spacing:.18em;color:rgba(212,168,83,0.35);">COVENTRY, UK · 2025</div>
    </div>

    <!-- bottom centre hint -->
    <div id="work-hint" style="
      position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
      font-size:9px;letter-spacing:.22em;color:rgba(240,236,227,0.2);
      white-space:nowrap;z-index:10;pointer-events:none;
    ">DRAG TO ROTATE · CLICK A FACE TO OPEN</div>

    <!-- active face label -->
    <div id="face-label" style="
      position:absolute;left:50%;transform:translateX(-50%);
      top:50%;margin-top:240px;
      font-size:10px;letter-spacing:.2em;color:rgba(240,236,227,0.35);
      text-align:center;pointer-events:none;z-index:10;
      transition:opacity .4s;
    "></div>
  `;

  // ── THREE.JS CUBE SCENE ──────────────────────────
  const container = document.getElementById('cube-container');
  const W = window.innerWidth, H = window.innerHeight;

  const cubeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  cubeRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  cubeRenderer.setSize(W, H);
  cubeRenderer.setClearColor(0x000000, 0);
  container.appendChild(cubeRenderer.domElement);

  const cubeScene = new THREE.Scene();
  const cubeCamera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
  cubeCamera.position.set(0, 0, 5.0);

  // ── STARFIELD BACKGROUND ──
  const sbGeo = new THREE.BufferGeometry();
  const sbPos = new Float32Array(1800 * 3);
  for (let i = 0; i < 1800; i++) {
    const r = 20 + Math.random() * 40;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    sbPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    sbPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    sbPos[i*3+2] = r * Math.cos(ph);
  }
  sbGeo.setAttribute('position', new THREE.BufferAttribute(sbPos, 3));
  const sbMat = new THREE.PointsMaterial({ color: 0xf0e8d0, size: 0.08, transparent: true, opacity: 0.55, sizeAttenuation: true });
  cubeScene.add(new THREE.Points(sbGeo, sbMat));

  // ── CUBE FACES (6 projects, BoxGeometry face order: +X -X +Y -Y +Z -Z) ──
  const faceOrder = [2, 0, 3, 4, 1, 5]; // indices into PROJECTS array

  // Placeholder grey textures while images load
  const placeholderTex = () => {
    const cv = document.createElement('canvas'); cv.width = cv.height = 4;
    const c = cv.getContext('2d'); c.fillStyle = '#111118'; c.fillRect(0,0,4,4);
    return new THREE.CanvasTexture(cv);
  };

  const cubeMaterials = faceOrder.map(() => new THREE.MeshStandardMaterial({
    map: placeholderTex(),
    roughness: 0.15,
    metalness: 0.08,
  }));

  // CUBE SIZE — smaller, refined
  const CUBE_S = 1.85;
  const cubeGeo = new THREE.BoxGeometry(CUBE_S, CUBE_S, CUBE_S);
  const cubeMesh = new THREE.Mesh(cubeGeo, cubeMaterials);
  cubeScene.add(cubeMesh);

  // ── EDGE WIREFRAME OVERLAY ──
  const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xd4a853, transparent: true, opacity: 0.5 });
  const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
  cubeMesh.add(edgeMesh);

  // ── CORNER GLOW SPRITES ──
  const glowCv = document.createElement('canvas'); glowCv.width = glowCv.height = 64;
  const gc = glowCv.getContext('2d');
  const gg2 = gc.createRadialGradient(32, 32, 0, 32, 32, 32);
  gg2.addColorStop(0, 'rgba(212,168,83,1)'); gg2.addColorStop(1, 'rgba(212,168,83,0)');
  gc.fillStyle = gg2; gc.fillRect(0, 0, 64, 64);
  const glowTex2 = new THREE.CanvasTexture(glowCv);
  const H2 = CUBE_S / 2;
  const corners = [
    [H2,H2,H2],[H2,H2,-H2],[H2,-H2,H2],[H2,-H2,-H2],
    [-H2,H2,H2],[-H2,H2,-H2],[-H2,-H2,H2],[-H2,-H2,-H2],
  ];
  corners.forEach(([x,y,z]) => {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex2, transparent: true, opacity: 0.55 }));
    sp.position.set(x, y, z); sp.scale.setScalar(0.16);
    cubeMesh.add(sp);
  });

  // ── LIGHTS ──
  cubeScene.add(new THREE.AmbientLight(0xf0ece3, 0.55));
  const kLight = new THREE.DirectionalLight(0xffffff, 1.1);
  kLight.position.set(4, 5, 4); cubeScene.add(kLight);
  const fLight = new THREE.DirectionalLight(0xd4a853, 0.6);
  fLight.position.set(-3, -2, -2); cubeScene.add(fLight);
  const ptLight = new THREE.PointLight(0xd4a853, 0.7, 20);
  ptLight.position.set(0, 0, 6); cubeScene.add(ptLight);

  // ── ASYNC IMAGE LOAD → apply to faces ──
  Promise.all(FACE_IMAGES.map(loadImage)).then(imgs => {
    faceOrder.forEach((projIdx, faceSlot) => {
      const proj = PROJECTS[projIdx];
      const img  = imgs[projIdx];
      const faceCv = buildFaceCanvas(proj, img);
      const tex = new THREE.CanvasTexture(faceCv);
      tex.anisotropy = cubeRenderer.capabilities.getMaxAnisotropy();
      tex.needsUpdate = true;
      cubeMaterials[faceSlot].map = tex;
      cubeMaterials[faceSlot].needsUpdate = true;
    });
  });
  let rotX = 0.4, rotY = 0.6;
  let tRotX = 0.4, tRotY = 0.6;
  let isDragging = false, prevMX = 0, prevMY = 0;
  let autoSpin = true;
  let spinTimer = null;

  const el = cubeRenderer.domElement;
  el.style.cursor = 'grab';

  el.addEventListener('mousedown', e => {
    isDragging = true; prevMX = e.clientX; prevMY = e.clientY;
    autoSpin = false; clearTimeout(spinTimer);
    el.style.cursor = 'grabbing';
    document.body.classList.add('hovering');
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false; el.style.cursor = 'grab';
    document.body.classList.remove('hovering');
    spinTimer = setTimeout(() => { autoSpin = true; }, 2200);
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    tRotY += (e.clientX - prevMX) * 0.012;
    tRotX += (e.clientY - prevMY) * 0.009;
    tRotX = Math.max(-1.2, Math.min(1.2, tRotX));
    prevMX = e.clientX; prevMY = e.clientY;
  });

  // Touch support
  el.addEventListener('touchstart', e => {
    isDragging = true; autoSpin = false; clearTimeout(spinTimer);
    prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY;
  });
  window.addEventListener('touchend', () => {
    isDragging = false;
    spinTimer = setTimeout(() => { autoSpin = true; }, 2200);
  });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    tRotY += (e.touches[0].clientX - prevMX) * 0.012;
    tRotX += (e.touches[0].clientY - prevMY) * 0.009;
    tRotX = Math.max(-1.2, Math.min(1.2, tRotX));
    prevMX = e.touches[0].clientX; prevMY = e.touches[0].clientY;
  });

  // ── CLICK DETECTION — which face is facing camera ──
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  el.addEventListener('click', e => {
    if (Math.abs(e.clientX - prevMX) > 5 || Math.abs(e.clientY - prevMY) > 5) return;
    const rect = el.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, cubeCamera);
    const hits = raycaster.intersectObject(cubeMesh);
    if (!hits.length) return;
    const hit = hits[0];
    const faceIdx = Math.floor(hit.faceIndex / 2); // BoxGeometry: 2 triangles per face
    const projIdx = faceOrder[faceIdx];
    openProject(PROJECTS[projIdx]);
  });

  // Hover cursor + face label
  let hoveredFace = -1;
  el.addEventListener('mousemove', e => {
    const rect = el.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, cubeCamera);
    const hits = raycaster.intersectObject(cubeMesh);
    if (hits.length) {
      const fi = Math.floor(hits[0].faceIndex / 2);
      if (fi !== hoveredFace) {
        hoveredFace = fi;
        const proj = PROJECTS[faceOrder[fi]];
        const lbl = document.getElementById('face-label');
        if (lbl) lbl.textContent = proj ? `${proj.num} — ${proj.name.split(' - ')[0].toUpperCase()}` : '';
      }
      if (!isDragging) el.style.cursor = 'pointer';
    } else {
      hoveredFace = -1;
      if (!isDragging) el.style.cursor = 'grab';
      const lbl = document.getElementById('face-label');
      if (lbl) lbl.textContent = '';
    }
  });

  // ── ANIMATE ──
  const cubeClock = new THREE.Clock();

  function cubeFrame() {
    workRAF = requestAnimationFrame(cubeFrame);
    const t = cubeClock.getElapsedTime();

    // Auto-spin
    if (autoSpin) tRotY += 0.004;

    // Smooth follow
    rotX += (tRotX - rotX) * 0.07;
    rotY += (tRotY - rotY) * 0.07;
    cubeMesh.rotation.x = rotX;
    cubeMesh.rotation.y = rotY;

    // Gentle float
    cubeMesh.position.y = Math.sin(t * 0.5) * 0.06;
    cubeMesh.scale.setScalar(1 + Math.sin(t * 0.4) * 0.008);

    // Edge shimmer
    edgeMat.opacity = 0.3 + Math.sin(t * 1.1) * 0.15;

    // Point light orbit
    ptLight.position.x = Math.sin(t * 0.4) * 4;
    ptLight.position.y = Math.cos(t * 0.3) * 3;

    // Right-panel highlight current front face
    const forward = new THREE.Vector3(0, 0, 1);
    forward.applyEuler(cubeMesh.rotation);
    let bestDot = -Infinity, bestFace = 0;
    const faceNormals = [
      new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
      new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
      new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
    ];
    faceNormals.forEach((n, i) => {
      const worldN = n.clone().applyEuler(cubeMesh.rotation);
      const d = worldN.dot(new THREE.Vector3(0,0,1));
      if (d > bestDot) { bestDot = d; bestFace = i; }
    });
    const activeProjIdx = faceOrder[bestFace];
    document.querySelectorAll('.pl-item').forEach((el2, i) => {
      const nameEl = el2.querySelector('.pl-name');
      if (!nameEl) return;
      if (i === activeProjIdx) {
        nameEl.style.color = '#d4a853';
        nameEl.style.fontWeight = '700';
      } else {
        nameEl.style.color = 'rgba(240,236,227,0.45)';
        nameEl.style.fontWeight = '400';
      }
    });

    cubeRenderer.render(cubeScene, cubeCamera);
  }
  workRAF = requestAnimationFrame(cubeFrame);
}

// ── PROJECT 06  -  PORTFOLIO ───────────────────────
function renderProject06() {
  return closeBtn() +
  `<div style="background:linear-gradient(135deg,#07070f 0%,#0d0f1a 100%);border:1px solid rgba(212,168,83,.2);padding:2rem;margin-bottom:2rem;border-radius:2px;">
    <div style="font-size:9px;letter-spacing:.22em;color:#d4a853;margin-bottom:.5rem;">PROJECT 06  -  THIS SITE</div>
    <div style="font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3vw,2rem);color:#f0ece3;font-weight:300;margin-bottom:.8rem;">bobbykeerthan.design</div>
    <div style="font-size:10px;letter-spacing:.16em;color:rgba(240,236,227,.45);line-height:1.9;">Built from scratch. No templates. No frameworks. Just Three.js, raw JavaScript, and a lot of late nights in Coventry.</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;">${['THREE.JS','CREATIVE CODE','INTERACTIVE','PORTFOLIO'].map(t=>`<span style="font-size:9px;letter-spacing:.14em;color:#d4a853;padding:3px 10px;border:1px solid rgba(212,168,83,.25);">${t}</span>`).join('')}</div>
  </div>
  ${csSection('WHAT WAS BUILT','Features & Systems')}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(240,236,227,.08);margin:1.2rem 0 1.8rem;">
    ${[['Pyramid Nav','4-corner interactive navigation with Three.js','#d4a853'],
       ['Black Hole','Animated accretion disk behind the pyramid','#5eb8ff'],
       ['Cosmic Starfield','3 layers of round stars + milky way band','#d4a853'],
       ['Project Nodes','Floating physics-based work canvas','#22d47a'],
       ['Case Studies','Full scrollable project detail overlays','#ff6b2b'],
       ['Shooting Stars','5 independent animated shooting stars','#d4a853']
    ].map(([n,d,c])=>`<div style="background:#07070f;padding:1rem;"><div style="font-size:10px;color:${c};letter-spacing:.1em;margin-bottom:.3rem;">${n}</div><div style="font-size:11px;color:rgba(240,236,227,.5);line-height:1.6;">${d}</div></div>`).join('')}
  </div>
  ${csSection('TECH STACK','How It Was Made')}
  <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin:1rem 0 1.5rem;">
    ${['Three.js r128','Vanilla JavaScript','HTML5 Canvas API','CSS3 Variables','Syne + DM Serif','No frameworks'].map(t=>`<span style="font-size:10px;color:rgba(240,236,227,.6);padding:5px 12px;border:1px solid rgba(240,236,227,.1);border-radius:2px;">${t}</span>`).join('')}
  </div>
  <p style="${bodyStyle}">Every pixel was a deliberate choice. The pyramid isn't just decorative  -  it's the whole navigation system. Each corner is a section. The black hole behind it was added because the hero felt too empty. The floating project nodes came from wanting something that felt alive, not just a list. It's a site that tries to feel like a place, not a document.</p>`;
}

const panel     = document.getElementById('panel');
const panelTag  = document.getElementById('panel-tag');
const panelTitle= document.getElementById('panel-title');
const panelBody = document.getElementById('panel-body');
const panelClose= document.getElementById('panel-close');

function openPanel(section) {
  if (section === 'work') {
    panel.classList.add('open');
    initWorkCanvas();
    return;
  }
  if (workRAF) { cancelAnimationFrame(workRAF); workRAF = null; }
  panel.classList.remove('work-mode');
  const c = CONTENT[section];
  panelTag.textContent  = c.tag;
  panelTitle.innerHTML  = c.title;
  panelBody.innerHTML   = c.html;
  panel.classList.add('open');
  setTimeout(() => {
    panel.querySelectorAll('.sk-fill').forEach(b => b.style.transform='scaleX('+parseFloat(b.style.width)/100+')');
  }, 120);
}

function closePanel() {
  panel.classList.remove('open');
  if (workRAF) { cancelAnimationFrame(workRAF); workRAF = null; }
  setTimeout(() => panel.classList.remove('work-mode'), 450);
  // Dispose Three.js cube renderer if present
  const cont = document.getElementById('cube-container');
  if (cont) {
    const gl = cont.querySelector('canvas');
    if (gl && gl._renderer) { gl._renderer.dispose(); }
    cont.innerHTML = '';
  }
}

panelClose.addEventListener('click', closePanel);
[panelClose].forEach(el => {
  el.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
});

document.querySelectorAll('.pt-label').forEach(el => {
  el.addEventListener('click', () => openPanel(el.dataset.section));
  el.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

// ── ANIMATE ─────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRot) tRotY += 0.0025;
  rotX += (tRotX - rotX) * 0.055;
  rotY += (tRotY - rotY) * 0.055;
  group3.rotation.x = rotX;
  group3.rotation.y = rotY;
  group3.scale.setScalar(1 + Math.sin(t * 0.7) * 0.012);

  edgeMat.opacity = 0.35 + Math.sin(t * 0.9) * 0.12;
  wireMat.opacity = 0.04 + Math.sin(t * 1.1) * 0.02;

  // Black hole rotation & pulse
  bhGroup.rotation.y = t * 0.06;
  // subtle halo pulse
  if (bhGroup.children[1]) bhGroup.children[1].material.opacity = 0.8 + Math.sin(t * 0.7) * 0.15;

  brightStars.rotation.y = t * 0.003;
  milkyWay.rotation.y    = t * 0.002;

  // Shooting stars
lastShoots.forEach((ls, i) => {
  if (t - ls > 1.5 + Math.random() * 3) {
    lastShoots[i] = t + Math.random() * 1.5;
    shootingStars.push(makeShootingStar());
  }
});
  shootingStars.forEach(ss => {
    if (!ss.active) return;
    ss.progress += ss.speed;
    if (ss.progress > 1.6) { ss.mat.opacity=0; ss.active=false; return; }
    const head = ss.start.clone().add(ss.dir.clone().multiplyScalar(ss.progress * 5));
    const tail = ss.start.clone().add(ss.dir.clone().multiplyScalar(Math.max(0, ss.progress-1.0) * 5));
    ss.geo.setFromPoints([tail, head]);
    ss.geo.computeBoundingSphere();
    const fade = ss.progress < 0.3 ? ss.progress/0.3 : ss.progress > 1.2 ? (1.6-ss.progress)/0.4 : 1;
    ss.mat.opacity = fade * 0.9;
  });

  renderer.render(scene, camera);

  // Update corner label positions
  SECTIONS.forEach(s => {
    const bv = baseVerts[s.baseIdx].clone();
    group3.localToWorld(bv);
    const sc2 = worldToScreen(bv);
    const el = document.getElementById(s.labelId);
    el.style.left = sc2.x + 'px';
    el.style.top  = sc2.y + 'px';
  });

  // Apex label
  const apv = apex.clone();
  group3.localToWorld(apv);
  const apSc = worldToScreen(apv);
  const apEl = document.getElementById('apex-label');
  apEl.style.left = apSc.x + 'px';
  apEl.style.top  = (apSc.y - 28) + 'px';
}
animate();
</script>
